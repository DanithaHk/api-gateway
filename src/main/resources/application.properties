server.port=8080
spring.application.name=api-gateway

# Eureka Server එකට සම්බන්ධ වීම
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# API Gateway Routing Configurations
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
# ---------------------------------------------------------
# User Service Route
spring.cloud.gateway.routes[0].id=USER-SERVICE
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**

# Inventory Service Route (Cosmic Apparel Items)
spring.cloud.gateway.routes[1].id=INVENTORY-SERVICE
spring.cloud.gateway.routes[1].uri=lb://INVENTORY-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/inventory/**

# Order Service Route (MongoDB Orders)
spring.cloud.gateway.routes[2].id=ORDER-SERVICE
spring.cloud.gateway.routes[2].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/orders/**
# ---------------------------------------------------------

# Global Cross-Origin (CORS) Configuration (Frontend එකට අවශ්‍ය වේ)
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE